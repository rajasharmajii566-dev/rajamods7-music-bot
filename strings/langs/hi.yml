start_1: "{0} ज़िंदा है बेबी।\n\n<b>✫ अपटाइम :</b> {1}"
start_2: "<b>❅────✦ नमस्ते {0} ✦────❅</b>\n\nमैं हूँ {1}, सब-इन-एक म्यूजिक बॉट।\n\n<b>◆ अल्ट्रा फास्ट वीसी प्लेयर विशेषताएं।</b>\n\n<b>✨ विशेषताएं ⚡️</b>\n<b>◆ टेलीग्राम ग्रुप्स के लिए बॉट।</b>\n<b>◆ सुपरफास्ट लैग फ्री प्लेयर।</b>\n<b>◆ आप म्यूजिक + वीडियो चला सकते हैं।</b>\n<b>◆ लाइव स्ट्रीमिंग।</b>\n<b>◆ कोई प्रोमो नहीं।</b>\n<b>◆ बेहतरीन साउंड क्वालिटी।</b>\n<b>◆ 24x7 आप म्यूजिक बजा सकते हैं।</b>\n<b>◆ इस बॉट को अपने ग्रुप में जोड़ें और एडमिन बनाएं और म्यूजिक का आनंद लें 🎵।</b>\n\n<b>▰▰▰▰▰▰▰▰▰▰▰▰▰</b>\n<b>➻ सपोर्टेड प्लेटफॉर्म ✧ यूट्यूब, स्पॉटिफाई, रेसो, एप्पल म्यूजिक, साउंडक्लाउड आदि।</b>\n<b>▰▰▰▰▰▰▰▰▰▰▰▰▰</b>\n<b>❅─────✧❅✦❅✧─────❅</b>"
start_3: "हे {0},\nयह है {1}\n\nमुझे {2} में जोड़ने के लिए धन्यवाद, {3} अब इस चैट में गाने चला सकता है।"
start_4: "🎄 <b>सुपरग्रुप की आवश्यकता है</b> 🎄\n\nकृपया अपने <b>ग्रुप</b> को <b>सुपरग्रुप</b> में बदलें और फिर मुझे दोबारा जोड़ें।\n\n<b>सुपरग्रुप कैसे बनाएं?</b>\n- अपने ग्रुप की चैट हिस्ट्री <b>विज़िबल</b> करें एक बार।"
