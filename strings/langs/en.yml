start_1 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5463107823946717464\">рҹҺө</emoji> <b>КңбҙҮКҸ {0}! бҙӣКңбҙҖЙҙбҙӢs кң°бҙҸКҖ бҙҖбҙ…бҙ…ЙӘЙҙЙў бҙҚбҙҮ!</b> <emoji id=\"5463107823946717464\">рҹҺө</emoji></blockquote>\n\n<blockquote><emoji id=\"5042334757040423886\">вҡЎпёҸ</emoji> <b>{1}</b> вҖ” бҙҳКҖбҙҮбҙҚЙӘбҙңбҙҚ бҙҚбҙңsЙӘбҙ„ sбҙӣКҖбҙҮбҙҖбҙҚбҙҮКҖ ЙӘs ЙҙбҙҸбҙЎ бҙҖбҙ„бҙӣЙӘбҙ бҙҮ ЙӘЙҙ КҸбҙҸбҙңКҖ ЙўКҖбҙҸбҙңбҙҳ!</blockquote>\n\n<blockquote><b>в—Ҳ бҙңбҙҳбҙӣЙӘбҙҚбҙҮ :</b> {2}\n<b>в—Ҳ sбҙӣбҙҸКҖбҙҖЙўбҙҮ :</b> {3}\n<b>в—Ҳ бҙ„бҙҳбҙң :</b> {4}\n<b>в—Ҳ КҖбҙҖбҙҚ :</b> {5}</blockquote>\n\n<blockquote><emoji id=\"5449449325434266744\">вқ„пёҸ</emoji> бҙңsбҙҮ <code>/play [song]</code> бҙӣбҙҸ sбҙӣбҙҖКҖбҙӣ sбҙӣКҖбҙҮбҙҖбҙҚЙӘЙҙЙў!\n<emoji id=\"5039598514980520994\">вқӨпёҸвҖҚрҹ”Ҙ</emoji> бҙҳбҙҸбҙЎбҙҮКҖбҙҮбҙ… КҷКҸ {6}</blockquote>"
start_2 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5463107823946717464\">рҹҺө</emoji> <b>КңбҙҮКҹКҹбҙҸ, {0}!</b> <emoji id=\"5463107823946717464\">рҹҺө</emoji></blockquote>\n\n<blockquote><emoji id=\"5042334757040423886\">вҡЎпёҸ</emoji> ЙӘ'бҙҚ <b>{1}</b>\nКҸбҙҸбҙңКҖ бҙңКҹбҙӣЙӘбҙҚбҙҖбҙӣбҙҮ бҙҚбҙңsЙӘбҙ„ sбҙӣКҖбҙҮбҙҖбҙҚЙӘЙҙЙў КҷбҙҸбҙӣ кң°бҙҸКҖ бҙӣбҙҮКҹбҙҮЙўКҖбҙҖбҙҚ ЙўКҖбҙҸбҙңбҙҳs</blockquote>\n\n<blockquote><b>рҹҺө бҙҳКҹбҙҖКҸ</b> вҖ” КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ, sбҙҳбҙҸбҙӣЙӘкң°КҸ, sбҙҸбҙңЙҙбҙ…бҙ„КҹбҙҸбҙңбҙ…, бҙҖбҙҳбҙҳКҹбҙҮ бҙҚбҙңsЙӘбҙ„\n<b>рҹ“» КҹЙӘбҙ бҙҮ</b> вҖ” sбҙӣКҖбҙҮбҙҖбҙҚ КҹЙӘбҙ бҙҮ КҖбҙҖбҙ…ЙӘбҙҸ &amp; КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ КҹЙӘбҙ бҙҮ\n<b>рҹҺ¬ бҙ ЙӘбҙ…бҙҮбҙҸ</b> вҖ” кң°бҙңКҹКҹ бҙ ЙӘбҙ…бҙҮбҙҸ бҙҳКҹбҙҖКҸКҷбҙҖбҙ„бҙӢ ЙӘЙҙ бҙ бҙ„\n<b>рҹ”Җ З«бҙңбҙҮбҙңбҙҮ</b> вҖ” бҙңЙҙКҹЙӘбҙҚЙӘбҙӣбҙҮбҙ… бҙӣКҖбҙҖбҙ„бҙӢ З«бҙңбҙҮбҙңбҙҮ\n<b>рҹ”Ғ КҹбҙҸбҙҸбҙҳ</b> вҖ” КҹбҙҸбҙҸбҙҳ &amp; бҙҖбҙңбҙӣбҙҸбҙҳКҹбҙҖКҸ бҙҚбҙҸбҙ…бҙҮs\n<b>вҡЎпёҸ кң°бҙҖsбҙӣ</b> вҖ” бҙўбҙҮКҖбҙҸ КҹбҙҖЙў, Кңбҙ… бҙҖбҙңбҙ…ЙӘбҙҸ, 24/7 бҙңбҙҳбҙӣЙӘбҙҚбҙҮ</blockquote>\n\n<blockquote><emoji id=\"5449449325434266744\">вқ„пёҸ</emoji> бҙҖбҙ…бҙ… бҙҚбҙҮ бҙӣбҙҸ КҸбҙҸбҙңКҖ ЙўКҖбҙҸбҙңбҙҳ бҙҖЙҙбҙ… бҙңsбҙҮ <code>/play</code> бҙӣбҙҸ КҷбҙҮЙўЙӘЙҙ!</blockquote>"
start_3 : "КңбҙҮКҸ {0},\nбҙӣКңЙӘs ЙӘs {1}\n\nбҙӣКңбҙҖЙҙбҙӢs Т“бҙҸКҖ бҙҖбҙ…бҙ…ЙӘЙҙЙў бҙҚбҙҮ ЙӘЙҙ {2}, {3} бҙ„бҙҖЙҙ ЙҙбҙҸбҙЎ бҙ©КҹбҙҖКҸ sбҙҸЙҙЙўs ЙӘЙҙ бҙӣКңЙӘs бҙ„КңбҙҖбҙӣ."
start_4 : "<emoji id=\"5449449325434266744\">вқ„пёҸ</emoji> <b>sбҙңбҙҳбҙҮКҖЙўКҖбҙҸбҙңбҙҳ ЙҙбҙҮбҙҮбҙ…бҙҮбҙ…</b> <emoji id=\"5449449325434266744\">вқ„пёҸ</emoji>\n\nбҙҳКҹбҙҮбҙҖsбҙҮ бҙ„бҙҸЙҙбҙ бҙҮКҖбҙӣ КҸбҙҸбҙңКҖ <b>ЙўКҖбҙҸбҙңбҙҳ</b> бҙӣбҙҸ <b>sбҙңбҙҳбҙҮКҖЙўКҖбҙҸбҙңбҙҳ</b> бҙҖЙҙбҙ… бҙӣКңбҙҮЙҙ бҙҖбҙ…бҙ… бҙҚбҙҮ бҙҖЙўбҙҖЙӘЙҙ.\n\n<b>КңбҙҸбҙЎ бҙӣбҙҸ бҙҚбҙҖбҙӢбҙҮ sбҙңбҙҳбҙҮКҖЙўКҖбҙҸбҙңбҙҳ ?</b>\n- бҙҚбҙҖбҙӢбҙҮ КҸбҙҸбҙңКҖ ЙўКҖбҙҸбҙңбҙҳ's бҙ„КңбҙҖбҙӣ КңЙӘsбҙӣбҙҸКҖКҸ <b>бҙ ЙӘsЙӘКҷКҹбҙҮ</b> бҙҸЙҙбҙ„бҙҮ."
start_5 : "<b>вҶқ КҷКҹбҙҖбҙ„бҙӢКҹЙӘsбҙӣбҙҮбҙ… бҙ„КңбҙҖбҙӣ вҶң</b>\n\nбҙӣКңЙӘs бҙ„КңбҙҖбҙӣ ЙӘs КҷКҹбҙҖбҙ„бҙӢКҹЙӘsбҙӣбҙҮбҙ… бҙҸЙҙ {0} бҙ…бҙҖбҙӣбҙҖКҷбҙҖsбҙҮ.\nКҖбҙҮЗ«бҙңбҙҮsбҙӣ бҙҖ <a href={1}>sбҙңбҙ…бҙҸ бҙңsбҙҮКҖ</a> бҙӣбҙҸ бҙңЙҙКҷКҹбҙҖбҙ„бҙӢКҹЙӘsбҙӣ КҸбҙҸбҙңКҖ бҙ„КңбҙҖбҙӣ бҙҸКҖ бҙ ЙӘsЙӘбҙӣ <a href={2}>sбҙңбҙҳбҙҳбҙҸКҖбҙӣ бҙ„КңбҙҖбҙӣ.</a>"
start_6 : "<blockquote>в”Ңв”Җв”Җв”Җв”Җв”Җв”Җ Л№ ЙӘЙҙТ“бҙҸКҖбҙҚбҙҖбҙӣЙӘбҙҸЙҙ Лјв”Җв”Җв”Җ вҸӨвҖҢвҖҢв—Ҹ\nв”Ҷ<emoji id=\"5042192219960771668\">рҹ§ё</emoji><b>бҙӣЙӘбҙӣКҹбҙҮ :</b> {0}\nв”Ҷ<emoji id=\"4979027931234830344\">вҸі</emoji> <b>бҙ…бҙңКҖбҙҖбҙӣЙӘбҙҸЙҙ :</b> {1} бҙҚЙӘЙҙбҙңбҙӣбҙҮs\nв”Ҷ<emoji id=\"5039623284056917259\">рҹ‘Җ</emoji> <b>бҙ ЙӘбҙҮбҙЎs :</b> <code>{2}</code>\nв”Ҷ<emoji id=\"6337029193603225180\">рҹ•”</emoji> <b>бҙ©бҙңКҷКҹЙӘsКңбҙҮбҙ… бҙҸЙҙ :</b> {3}\nв”Ҷ<emoji id=\"6039451237743595514\">рҹ“Һ</emoji> <b>бҙ„КңбҙҖЙҙЙҙбҙҮКҹ :</b> <a href=\"{4}\">{5}</a>\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв—Ҹ</blockquote>\n<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n<blockquote><emoji id=\"5972072533833289156\">рҹ”№</emoji> sбҙҮбҙҖКҖбҙ„Кң бҙ©бҙҸбҙЎбҙҮКҖбҙҮбҙ… КҷКҸ <a href='https://t.me/PGL_B4CHI'>{6}</a></blockquote>"

help_1 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5463107823946717464\">рҹҺө</emoji> <b>бҙҚбҙңsЙӘбҙ„ КҷбҙҸбҙӣ вҖ” бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…s</b> <emoji id=\"5463107823946717464\">рҹҺө</emoji></blockquote>\n\n<blockquote><emoji id=\"5042334757040423886\">вҡЎпёҸ</emoji> sбҙҮКҹбҙҮбҙ„бҙӣ бҙҖ бҙ„бҙҖбҙӣбҙҮЙўбҙҸКҖКҸ КҷбҙҮКҹбҙҸбҙЎ бҙӣбҙҸ бҙ ЙӘбҙҮбҙЎ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…s</blockquote>\n\n<blockquote><emoji id=\"5039598514980520994\">вқӨпёҸвҖҚрҹ”Ҙ</emoji> sбҙңбҙҳбҙҳбҙҸКҖбҙӣ: <a href={0}>бҙҠбҙҸЙӘЙҙ КңбҙҮКҖбҙҮ</a>\n<emoji id=\"5449449325434266744\">вқ„пёҸ</emoji> бҙҳКҖбҙҮкң°ЙӘx: <code>/</code> бҙҸКҖ <code>.</code> бҙҸКҖ <code>!</code></blockquote>"
help_2 : "бҙ„КҹЙӘбҙ„бҙӢ бҙҸЙҙ бҙӣКңбҙҮ КҷбҙңбҙӣбҙӣбҙҸЙҙ КҷбҙҮКҹбҙҸбҙЎ бҙӣбҙҸ ЙўбҙҮбҙӣ бҙҚКҸ КңбҙҮКҹбҙҳ бҙҚбҙҮЙҙбҙң ЙӘЙҙ КҸбҙҸбҙңКҖ бҙҳбҙҚ."

lang_1 : "В» бҙҳКҹбҙҮбҙҖsбҙҮ бҙ„КңбҙҸбҙҸsбҙҮ бҙӣКңбҙҮ КҹбҙҖЙҙЙўбҙңбҙҖЙўбҙҮ бҙЎКңЙӘбҙ„Кң КҸбҙҸбҙң бҙЎбҙҖЙҙЙҙбҙҖ sбҙҮбҙӣ бҙҖs бҙӣКңЙӘs ЙўКҖбҙҸбҙңбҙҳ's бҙ…бҙҮТ“бҙҖбҙңКҹбҙӣ КҹбҙҖЙҙЙўбҙңбҙҖЙўбҙҮ :"
lang_2 : "КҹбҙҖЙҙЙўбҙңбҙҖЙўбҙҮ бҙ„КңбҙҖЙҙЙўбҙҮбҙ… sбҙңбҙ„бҙ„бҙҮssТ“бҙңКҹКҹКҸ."
lang_3 : "Т“бҙҖЙӘКҹбҙҮбҙ… бҙӣбҙҸ бҙ„КңбҙҖЙҙЙўбҙҮ КҹбҙҖЙҙЙўбҙңбҙҖЙўбҙҮ."
lang_4 : "YбҙҸбҙң'КҖбҙҮ бҙҖКҹКҖбҙҮбҙҖбҙ…КҸ бҙҸЙҙ бҙӣКңбҙҮ sбҙҖбҙҚбҙҮ КҹбҙҖЙҙЙўбҙңбҙҖЙўбҙҮ."

setting_1 : "<b>вқ…в”Җв”Җв”Җв”ҖвңҰ {0} sбҙҮбҙӣбҙӣЙӘЙҙЙўs вңҰв”Җв”Җв”Җв”Җвқ…</b>\n\n<b>в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°</b>\n<b>вһ» бҙ„КңбҙҖбҙӣ бҙӣЙӘбҙӣКҹбҙҮ вң§</b> {2}\n<b>вһ» бҙ„КңбҙҖбҙӣ ЙӘбҙ… вң§</b> <code>{1}</code>\n<b>в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°в–°</b>\n<b>вқ…в”Җв”Җв”Җв”Җв”Җвң§вқ…вңҰвқ…вң§в”Җв”Җв”Җв”Җв”Җвқ…</b>"
setting_2 : "В» бҙ…ЙӘКҖбҙҮбҙ„бҙӣ : бҙҳКҹбҙҖКҸs sбҙҮбҙҖКҖбҙ„Кң З«бҙңбҙҮКҖЙӘбҙҮs бҙ…ЙӘКҖбҙҮбҙ„бҙӣКҹКҸ.\n\nВ» ЙӘЙҙКҹЙӘЙҙбҙҮ : КҖбҙҮбҙӣбҙңКҖЙҙs ЙӘЙҙКҹЙӘЙҙбҙҮ КҷбҙңбҙӣбҙӣбҙҸЙҙs кң°бҙҸКҖ бҙ„КңбҙҸбҙҸsЙӘЙҙЙў КҷбҙҮбҙӣбҙЎбҙҮбҙҮЙҙ бҙ ЙӘбҙ…бҙҮбҙҸ & бҙҖбҙңбҙ…ЙӘбҙҸ."
setting_3 : "В» бҙҮбҙ бҙҮКҖКҸбҙҸЙҙбҙҮ : бҙҖЙҙКҸбҙҸЙҙбҙҮ бҙ„бҙҖЙҙ бҙңsбҙҮ бҙҖбҙ…бҙҚЙӘЙҙ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…s [sбҙӢЙӘбҙҳ, бҙҳбҙҖбҙңsбҙҮ, КҖбҙҮsбҙңбҙҚбҙҮ бҙҮбҙӣбҙ„.] бҙҳКҖбҙҮsбҙҮЙҙбҙӣ ЙӘЙҙ бҙӣКңЙӘs ЙўКҖбҙҸбҙңбҙҳ.\n\nВ» бҙҖбҙ…бҙҚЙӘЙҙ бҙҸЙҙКҹКҸ : бҙҸЙҙКҹКҸ бҙҖбҙ…бҙҚЙӘЙҙs бҙҖЙҙбҙ… бҙҖбҙңбҙӣКңбҙҸКҖЙӘбҙўбҙҮбҙ… бҙңsбҙҮКҖs бҙ„бҙҖЙҙ бҙңsбҙҮ бҙҖбҙ…бҙҚЙӘЙҙ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ…s."
setting_4 : "В» ЙҙбҙҸ бҙҖбҙңбҙӣКңбҙҸКҖЙӘбҙўбҙҮбҙ… бҙңsбҙҮКҖs кң°бҙҸбҙңЙҙбҙ…."
setting_5 : "В» ЙўКҖбҙҸбҙңбҙҳ : бҙҳКҹбҙҖКҸs бҙҚбҙңsЙӘбҙ„ ЙӘЙҙ бҙӣКңбҙҮ ЙўКҖбҙҸбҙңбҙҳ бҙЎКңбҙҮКҖбҙҮ бҙӣКңбҙҮ бҙ„бҙҸбҙҚбҙҚбҙҖЙҙбҙ… ЙӘs ЙўЙӘбҙ бҙҮЙҙ.\n\nВ» бҙ„КңбҙҖЙҙЙҙбҙҮКҹ : бҙҳКҹбҙҖКҸs бҙҚбҙңsЙӘбҙ„ ЙӘЙҙ бҙӣКңбҙҮ бҙ„КңбҙҖЙҙЙҙбҙҮКҹ КҸбҙҸбҙң бҙЎбҙҖЙҙбҙӣ. sбҙҮбҙӣ бҙ„КңбҙҖЙҙЙҙбҙҮКҹ ЙӘбҙ… бҙ ЙӘбҙҖ /channelplay"
