# Song
song_1 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5039598514980520994\">вқӨпёҸвҖҚрҹ”Ҙ</emoji> <b>КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ бҙ…бҙҸбҙЎЙҙКҹбҙҸбҙҖбҙ…бҙҮКҖ</b></blockquote>\n<blockquote><emoji id=\"5972072533833289156\">рҹ”№</emoji> КҸбҙҸбҙң бҙ„бҙҖЙҙ бҙ…бҙҸбҙЎЙҙКҹбҙҸбҙҖбҙ… бҙҚбҙңsЙӘбҙ„ бҙҸКҖ бҙ ЙӘбҙ…бҙҮбҙҸ кң°КҖбҙҸбҙҚ КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ бҙҸЙҙКҹКҸ ЙӘЙҙ бҙҳКҖЙӘбҙ бҙҖбҙӣбҙҮ бҙ„КңбҙҖбҙӣ.\nбҙҳКҹбҙҮбҙҖsбҙҮ sбҙӣбҙҖКҖбҙӣ бҙҚбҙҮ ЙӘЙҙ бҙҳКҖЙӘбҙ бҙҖбҙӣбҙҮ бҙ„КңбҙҖбҙӣ.</blockquote>"
song_2 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5039598514980520994\">вқӨпёҸвҖҚрҹ”Ҙ</emoji> <b>КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ бҙ…бҙҸбҙЎЙҙКҹбҙҸбҙҖбҙ…бҙҮКҖ</b></blockquote>\n<blockquote><emoji id=\"5972072533833289156\">рҹ”№</emoji> <b>бҙңsбҙҖЙўбҙҮ:</b>\n/song [бҙҚбҙңsЙӘбҙ„ ЙҙбҙҖбҙҚбҙҮ] бҙҸКҖ [КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ КҹЙӘЙҙбҙӢ]</blockquote>"
song_3 : "<blockquote><emoji id=\"5042192219960771668\">рҹ§ё</emoji> <b>рқ—Ҙрқ—”рқ—қрқ—”рқ— рқ—ўрқ——рқ—Ұрқҹі рқ— рқ—Ёрқ—Ұрқ—ңрқ—–</b></blockquote>\n\n<blockquote><emoji id=\"5042334757040423886\">вҡЎпёҸ</emoji> <b>КҹЙӘбҙ бҙҮ КҹЙӘЙҙбҙӢ бҙ…бҙҮбҙӣбҙҮбҙ„бҙӣбҙҮбҙ…</b></blockquote>\n<blockquote><emoji id=\"5972072533833289156\">рҹ”№</emoji> ЙӘ бҙҖбҙҚ ЙҙбҙҸбҙӣ бҙҖКҷКҹбҙҮ бҙӣбҙҸ бҙ…бҙҸбҙЎЙҙКҹбҙҸбҙҖбҙ… КҹЙӘбҙ бҙҮ КҸбҙҸбҙңбҙӣбҙңКҷбҙҮ бҙ ЙӘбҙ…бҙҮбҙҸs.</blockquote>"
